name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit + plugin tests
        env:
          ENERGY_LAB_DATA_DIR: ${{ github.workspace }}/.ci-data
        run: |
          mkdir -p "$ENERGY_LAB_DATA_DIR"
          pytest tests/ -v --tb=short --maxfail=3
